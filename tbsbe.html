	<h3 id="send-type">--Placeholder--</h3>
	<p><input type="text" class="text-box" id="nickname" placeholder="Enter a Nickname" /></p>
	<p><input type="text" class="text-box" id="text" placeholder="Text" /></p>
	<p><button class="send-btn" onclick="send()">Send</button></p>
	<p id="status"></p>

  <script src="scripts/main.js"></script>
	<script>
	
		function bugReport() {
			document.getElementById('callback').style.display = 'inline';
			document.getElementById('send-type').textContent = 'Bug Report';
		}
		
		function feedBack() {
			document.getElementById('callback').style.display = 'inline';
			document.getElementById('send-type').textContent = 'FeedBack';
		}
		
		async function send() {
		const status = document.getElementById("status");
		const nickname = document.getElementById("nickname").value.trim();
		const text = document.getElementById("text");
		const sendtype = document.getElementById("send-type");
		const project = "TBSBE";

		status.textContent = "❏ Elaborating...";
		status.style.color= "#ff9206";
	
		const risposta = await fetch("", {
			method: "POST",
			headers: { "Content-Type": "application/json" },
			body: JSON.stringify({ Project: project, Type: sendtype , User: nickname, Text: text })
		});
	
		if (risposta.ok) {
			if (sendtype === "Bug Report") {
				status.textContent = "☑ Bug report sent";
			} else if (sendtype === "FeedBack") {
				status.textContent = "☑ FeedBack sent";
			}
			status.style.color= "#07ff06";
		} else {
			status.textContent = "❌ Error";
			status.style.color= "#ff0626";
		}
	}
